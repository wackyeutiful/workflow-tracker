version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: workflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: workflow_db
    volumes:
      - mongo-data:/data/db
    networks:
      - workflow-net
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/workflow_db --quiet | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./tracker-backend
      dockerfile: Dockerfile
    container_name: workflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/workflow_db
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
    networks:
      - workflow-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./workflow-tracker
      dockerfile: Dockerfile
    container_name: workflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - workflow-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  mongo-data:

networks:
  workflow-net:
    driver: bridge