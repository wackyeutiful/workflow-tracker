version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: workflow-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: workflow_db
    volumes:
      - mongo-data:/data/db
    networks:
      - workflow-net
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/workflow_db --quiet | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    image: ghcr.io/wackyeutiful/workflow-tracker/backend:main
    container_name: workflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/workflow_db
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
    networks:
      - workflow-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/wackyeutiful/workflow-tracker/frontend:main
    container_name: workflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - workflow-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: workflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - workflow-net
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.1
    container_name: workflow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - workflow-net
    depends_on:
      - prometheus

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  workflow-net:
    driver: bridge